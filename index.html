<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Simulator</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<style>
:root {
  --bg: #0f172a;
  --panel-bg: #1e293b;
  --text: #f8fafc;
  --muted: #94a3b8;
  --accent: #3b82f6;
  --accent-2: #22c55e;
  --border: #334155;
}
body[data-theme="light"] {
  --bg: #f8fafc;
  --panel-bg: #ffffff;
  --text: #0f172a;
  --muted: #475569;
  --accent: #2563eb;
  --accent-2: #16a34a;
  --border: #e2e8f0;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
}
.app-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px;
  border-bottom: 1px solid var(--border);
}
.app-layout {
  display: flex;
  gap: 16px;
  padding: 16px;
}
.input-panel {
  flex: 0 0 280px;
  background: var(--panel-bg);
  border-radius: 8px;
  padding: 16px;
}
.results {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 16px;
  min-width: 0;
}
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 4px; }
.field input[type="range"] { width: 100%; }
.field input[type="number"], .field select {
  width: 100%;
  padding: 6px 8px;
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 4px;
}
.summary-cards {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.summary-card {
  background: var(--panel-bg);
  border-radius: 8px;
  padding: 12px 16px;
  flex: 1;
  min-width: 160px;
}
.summary-card .label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
.chart-section, .table-section {
  background: var(--panel-bg);
  border-radius: 8px;
  padding: 12px;
}
#schedule-table { width: 100%; border-collapse: collapse; }
#schedule-table th, #schedule-table td {
  padding: 6px 8px;
  border-bottom: 1px solid var(--border);
  text-align: right;
  font-size: 13px;
}
#schedule-table td[data-editable="rate"] { cursor: text; color: var(--accent); }
.table-hint { font-size: 12px; color: var(--muted); margin: 0 0 8px; }
.tabs { display: flex; gap: 8px; margin-bottom: 4px; }
.tab-button {
  padding: 8px 16px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--panel-bg);
  color: var(--text);
  cursor: pointer;
  font-size: 14px;
}
.tab-button.active { background: var(--accent); color: #ffffff; border-color: var(--accent); }
.tab-panel { display: flex; flex-direction: column; gap: 16px; }
.tab-panel[hidden] { display: none; }
.chart-donut { max-width: 220px; margin: 0 auto; }
.goal-section .field { max-width: 280px; }
.goal-button {
  padding: 8px 16px;
  border-radius: 6px;
  border: 1px solid var(--accent);
  background: var(--accent);
  color: #ffffff;
  cursor: pointer;
  font-size: 14px;
}
.goal-result { margin-top: 12px; font-size: 15px; }
.goal-race { margin-top: 20px; display: flex; flex-direction: column; gap: 18px; }
.race-lane { max-width: 480px; }
.race-label { font-size: 13px; color: var(--muted); margin-bottom: 6px; }
.race-track {
  position: relative;
  height: 10px;
  background: var(--border);
  border-radius: 999px;
  overflow: visible;
}
.race-marker {
  position: absolute;
  top: 50%;
  left: 0;
  transform: translate(0, -50%);
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--accent-2);
  transition-property: left;
  transition-timing-function: linear;
}
.race-marker.go { left: calc(100% - 16px); }
.race-lane.boost .race-marker { background: var(--accent); }
.mobile-only { display: none; }

@media (max-width: 720px) {
  .app-layout { flex-direction: column; }
  .input-panel {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    max-height: 70vh;
    overflow-y: auto;
    transform: translateY(100%);
    transition: transform 0.2s ease;
    z-index: 10;
    border-radius: 12px 12px 0 0;
  }
  .input-panel.open { transform: translateY(0); }
  .mobile-only { display: block; margin: 0 16px 8px; }
}

</style>
</head>
<body data-theme="dark">
  <header class="app-header">
    <h1>Portfolio Simulator</h1>
    <button id="theme-toggle" type="button">다크 / 라이트</button>
  </header>

  <button id="input-panel-toggle" class="mobile-only" type="button">입력값 열기</button>

  <div class="app-layout">
    <aside id="input-panel" class="input-panel">
      <div class="field">
        <label for="initialInvestment">초기 투자금 (만원)</label>
        <input type="range" id="initialInvestment-range" min="0" max="100000" step="10">
        <input type="number" id="initialInvestment" min="0" step="10">
      </div>
      <div class="field">
        <label for="contributionAmount">정기 납입액 (만원)</label>
        <input type="range" id="contributionAmount-range" min="0" max="1000" step="1">
        <input type="number" id="contributionAmount" min="0" step="1">
      </div>
      <div class="field">
        <label for="contributionFrequency">납입 주기</label>
        <select id="contributionFrequency">
          <option value="monthly">매월</option>
          <option value="quarterly">분기</option>
          <option value="yearly">매년</option>
        </select>
      </div>
      <div class="field">
        <label for="contributionGrowthRate">납입액 연 증가율 (%)</label>
        <input type="range" id="contributionGrowthRate-range" min="0" max="20" step="0.5">
        <input type="number" id="contributionGrowthRate" min="0" step="0.5">
      </div>
      <div class="field">
        <label for="contributionStopYear">납입 중단 연차 (0=중단 없음)</label>
        <input type="number" id="contributionStopYear" min="0" step="1" value="0">
      </div>
      <div class="field">
        <label for="annualRate">연 수익률 (%)</label>
        <input type="range" id="annualRate-range" min="-20" max="30" step="0.1">
        <input type="number" id="annualRate" step="0.1">
      </div>
      <div class="field">
        <label for="compoundingFrequency">복리 주기</label>
        <select id="compoundingFrequency">
          <option value="monthly">월복리</option>
          <option value="yearly">연복리</option>
        </select>
      </div>
      <div class="field">
        <label for="years">투자 기간 (년)</label>
        <input type="range" id="years-range" min="1" max="50" step="1">
        <input type="number" id="years" min="1" step="1">
      </div>
      <div class="field">
        <label for="inflationRate">물가상승률 (%)</label>
        <input type="range" id="inflationRate-range" min="0" max="10" step="0.1">
        <input type="number" id="inflationRate" min="0" step="0.1">
      </div>
      <div class="field">
        <label><input type="checkbox" id="showReal"> 실질 가치로 보기</label>
      </div>
    </aside>

    <main class="results">
      <div class="tabs">
        <button class="tab-button active" data-tab="simulate" type="button">시뮬레이션</button>
        <button class="tab-button" data-tab="goal" type="button">목표 역산</button>
      </div>

      <div id="tab-simulate" class="tab-panel">
        <section class="summary-cards" id="summary-cards"></section>
        <section class="chart-section">
          <canvas id="asset-chart" height="120"></canvas>
        </section>
        <section class="chart-section">
          <div class="chart-donut">
            <canvas id="ratio-chart"></canvas>
          </div>
        </section>
        <section class="table-section">
          <p class="table-hint">"수익률(%)" 셀을 클릭해 값을 직접 수정할 수 있습니다. 손실이 난 해는 음수로 입력하세요 (예: -15).</p>
          <table id="schedule-table">
            <thead>
              <tr>
                <th>연도</th><th>수익률(%)</th><th>납입액(억원)</th><th>수익금(억원)</th><th>누적 원금(억원)</th><th>누적 수익(억원)</th><th>총자산(억원)</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </section>
      </div>

      <div id="tab-goal" class="tab-panel" hidden>
        <section class="goal-section">
          <p class="table-hint">왼쪽 입력값(초기 투자금, 납입액, 수익률 등)은 그대로 사용하고, "투자 기간" 대신 목표 금액을 입력하면 도달까지 걸리는 기간을 역산합니다.</p>
          <div class="field">
            <label for="goalAmount">목표 금액 (억원)</label>
            <input type="number" id="goalAmount" min="0" step="0.1" value="10">
          </div>
          <div class="field">
            <label for="contributionBoost">납입액을 얼마나 늘려볼까요? (만원)</label>
            <input type="number" id="contributionBoost" min="0" step="1" value="20">
          </div>
          <button id="goal-calculate" class="goal-button" type="button">목표까지 걸리는 기간 계산</button>
          <div id="goal-result" class="goal-result"></div>
          <div id="goal-race" class="goal-race"></div>
        </section>
      </div>
    </main>
  </div>

<script>
(function (root, factory) {
  if (typeof module !== 'undefined' && module.exports) {
    module.exports = factory();
  } else {
    root.CompoundCalc = factory();
  }
})(typeof window !== 'undefined' ? window : globalThis, function () {
  function generateSchedule(params) {
    const {
      initialInvestment,
      contributionAmount = 0,
      contributionFrequency = 'monthly',
      contributionGrowthRate = 0,
      contributionStopYear = null,
      annualRate,
      compoundingFrequency,
      years,
      inflationRate = 0,
      rateOverrides = {}
    } = params;

    const contributionMonths = { monthly: 1, quarterly: 3, yearly: 12 }[contributionFrequency];
    const rows = [];
    let balance = initialInvestment;
    let cumulativePrincipal = initialInvestment;
    let cumulativeProfit = 0;

    for (let year = 1; year <= years; year++) {
      const rate = rateOverrides[year] !== undefined ? rateOverrides[year] : annualRate;
      const monthlyRate = rate / 12;
      const yearStartBalance = balance;
      let yearContribution = 0;

      const contributionActive = contributionStopYear == null || year <= contributionStopYear;
      const currentContribution = contributionActive
        ? contributionAmount * Math.pow(1 + contributionGrowthRate, year - 1)
        : 0;

      for (let month = 1; month <= 12; month++) {
        let monthContribution = 0;
        if (currentContribution > 0 && month % contributionMonths === 0) {
          monthContribution = currentContribution;
          yearContribution += monthContribution;
          cumulativePrincipal += monthContribution;
        }
        if (compoundingFrequency === 'monthly') {
          balance = (balance + monthContribution) * (1 + monthlyRate);
        } else {
          balance += monthContribution;
        }
      }

      if (compoundingFrequency === 'yearly') {
        balance += balance * rate;
      }

      const yearProfit = balance - yearStartBalance - yearContribution;
      cumulativeProfit += yearProfit;

      const inflationFactor = Math.pow(1 + inflationRate, year);

      rows.push({
        year,
        rate,
        contribution: yearContribution,
        profit: yearProfit,
        cumulativePrincipal,
        cumulativeProfit,
        totalAsset: balance,
        realTotalAsset: balance / inflationFactor
      });
    }

    return rows;
  }

  function summarize(schedule) {
    if (schedule.length === 0) {
      return { finalAsset: 0, realFinalAsset: 0, totalPrincipal: 0, totalProfit: 0 };
    }
    const last = schedule[schedule.length - 1];
    return {
      finalAsset: last.totalAsset,
      realFinalAsset: last.realTotalAsset,
      totalPrincipal: last.cumulativePrincipal,
      totalProfit: last.cumulativeProfit
    };
  }

  return { generateSchedule, summarize };
});

</script>
<script>
(function () {
  const eok = (v) => (v / 100000000).toLocaleString('ko-KR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

  const syncedIds = [
    'initialInvestment', 'contributionAmount', 'contributionGrowthRate',
    'annualRate', 'years', 'inflationRate'
  ];

  let rateOverrides = {};
  let assetChart = null;
  let ratioChart = null;

  function syncPair(id) {
    const range = document.getElementById(id + '-range');
    const number = document.getElementById(id);
    range.addEventListener('input', () => { number.value = range.value; recalculate(); });
    number.addEventListener('input', () => { range.value = number.value; recalculate(); });
  }

  function readInputs() {
    return {
      initialInvestment: Number(document.getElementById('initialInvestment').value) * 10000,
      contributionAmount: Number(document.getElementById('contributionAmount').value) * 10000,
      contributionFrequency: document.getElementById('contributionFrequency').value,
      contributionGrowthRate: Number(document.getElementById('contributionGrowthRate').value) / 100,
      contributionStopYear: Number(document.getElementById('contributionStopYear').value) || null,
      annualRate: Number(document.getElementById('annualRate').value) / 100,
      compoundingFrequency: document.getElementById('compoundingFrequency').value,
      years: Number(document.getElementById('years').value),
      rateOverrides,
      inflationRate: Number(document.getElementById('inflationRate').value) / 100
    };
  }

  function renderSummary(summary, showReal) {
    const el = document.getElementById('summary-cards');
    const finalAsset = showReal ? summary.realFinalAsset : summary.finalAsset;
    el.innerHTML =
      '<div class="summary-card"><div class="label">최종 자산</div><div>' + eok(finalAsset) + '억원</div></div>' +
      '<div class="summary-card"><div class="label">누적 원금</div><div>' + eok(summary.totalPrincipal) + '억원</div></div>' +
      '<div class="summary-card"><div class="label">누적 수익</div><div>' + eok(summary.totalProfit) + '억원</div></div>';
  }

  function renderAssetChart(schedule, showReal) {
    const ctx = document.getElementById('asset-chart');
    const data = {
      labels: schedule.map((r) => r.year + '년'),
      datasets: [{
        label: showReal ? '실질 총자산 (억원)' : '총자산 (억원)',
        data: schedule.map((r) => Number(((showReal ? r.realTotalAsset : r.totalAsset) / 100000000).toFixed(2))),
        borderColor: '#3b82f6',
        fill: false
      }]
    };
    if (assetChart) {
      assetChart.data = data;
      assetChart.update();
    } else {
      assetChart = new Chart(ctx, { type: 'line', data });
    }
  }

  function renderRatioChart(summary) {
    const ctx = document.getElementById('ratio-chart');
    const data = {
      labels: ['누적 원금', '누적 수익'],
      datasets: [{
        data: [Number((summary.totalPrincipal / 100000000).toFixed(2)), Number((summary.totalProfit / 100000000).toFixed(2))],
        backgroundColor: ['#3b82f6', '#22c55e']
      }]
    };
    const options = {
      responsive: true,
      maintainAspectRatio: true,
      aspectRatio: 1,
      plugins: {
        datalabels: {
          color: '#ffffff',
          font: { weight: 'bold' },
          formatter: (value) => value.toLocaleString('ko-KR') + '억원'
        }
      }
    };
    if (ratioChart) {
      ratioChart.data = data;
      ratioChart.update();
    } else {
      ratioChart = new Chart(ctx, { type: 'doughnut', data, options, plugins: [ChartDataLabels] });
    }
  }

  function renderTable(schedule) {
    const tbody = document.querySelector('#schedule-table tbody');
    tbody.innerHTML = schedule.map((r) =>
      '<tr data-year="' + r.year + '">' +
        '<td>' + r.year + '</td>' +
        '<td data-editable="rate" contenteditable="true">' + (r.rate * 100).toFixed(1) + '</td>' +
        '<td>' + eok(r.contribution) + '</td>' +
        '<td>' + eok(r.profit) + '</td>' +
        '<td>' + eok(r.cumulativePrincipal) + '</td>' +
        '<td>' + eok(r.cumulativeProfit) + '</td>' +
        '<td>' + eok(r.totalAsset) + '</td>' +
      '</tr>'
    ).join('');

    tbody.querySelectorAll('td[data-editable="rate"]').forEach((cell) => {
      cell.addEventListener('blur', () => {
        const year = Number(cell.closest('tr').dataset.year);
        const value = Number(cell.textContent);
        if (!Number.isNaN(value)) {
          rateOverrides[year] = value / 100;
          recalculate();
        }
      });
    });
  }

  function recalculate() {
    const inputs = readInputs();
    const schedule = CompoundCalc.generateSchedule(inputs);
    const summary = CompoundCalc.summarize(schedule);
    const showReal = document.getElementById('showReal').checked;
    renderSummary(summary, showReal);
    renderAssetChart(schedule, showReal);
    renderRatioChart(summary);
    renderTable(schedule);
  }

  syncedIds.forEach(syncPair);
  document.getElementById('contributionFrequency').addEventListener('change', recalculate);
  document.getElementById('contributionStopYear').addEventListener('input', recalculate);
  document.getElementById('compoundingFrequency').addEventListener('change', recalculate);
  document.getElementById('showReal').addEventListener('change', recalculate);

  document.getElementById('initialInvestment').value = 1000;
  document.getElementById('initialInvestment-range').value = 1000;
  document.getElementById('contributionAmount').value = 50;
  document.getElementById('contributionAmount-range').value = 50;
  document.getElementById('contributionGrowthRate').value = 0;
  document.getElementById('contributionGrowthRate-range').value = 0;
  document.getElementById('annualRate').value = 7;
  document.getElementById('annualRate-range').value = 7;
  document.getElementById('years').value = 20;
  document.getElementById('years-range').value = 20;
  document.getElementById('inflationRate').value = 2;
  document.getElementById('inflationRate-range').value = 2;

  document.getElementById('theme-toggle').addEventListener('click', () => {
    const body = document.body;
    body.dataset.theme = body.dataset.theme === 'dark' ? 'light' : 'dark';
  });

  document.getElementById('input-panel-toggle').addEventListener('click', () => {
    document.getElementById('input-panel').classList.toggle('open');
  });

  document.querySelectorAll('.tab-button').forEach((btn) => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-button').forEach((b) => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-simulate').hidden = btn.dataset.tab !== 'simulate';
      document.getElementById('tab-goal').hidden = btn.dataset.tab !== 'goal';
    });
  });

  function manwonLabel(v) {
    return Math.round(v / 10000).toLocaleString('ko-KR') + '만원';
  }

  function findYearsToGoal(inputs, contributionAmount, goalWon, showReal) {
    for (let year = 1; year <= 100; year++) {
      const schedule = CompoundCalc.generateSchedule(Object.assign({}, inputs, { years: year, contributionAmount }));
      const last = schedule[schedule.length - 1];
      const asset = showReal ? last.realTotalAsset : last.totalAsset;
      if (asset >= goalWon) return year;
    }
    return null;
  }

  function renderGoalRace(baseYears, boostedYears, boostWon, baseContribution) {
    const el = document.getElementById('goal-race');
    if (!baseYears && !boostedYears) {
      el.innerHTML = '';
      return;
    }

    const raceMax = Math.max(baseYears || 100, boostedYears || 100, 1);
    const baseDuration = baseYears ? Math.max(0.4, 2 * (baseYears / raceMax)) : 2;
    const boostDuration = boostedYears ? Math.max(0.4, 2 * (boostedYears / raceMax)) : 2;

    el.innerHTML =
      '<div class="race-lane">' +
        '<div class="race-label">현재 납입액 (' + manwonLabel(baseContribution) + ') — ' + (baseYears ? baseYears + '년' : '100년 이내 미도달') + '</div>' +
        '<div class="race-track"><div class="race-marker" id="race-marker-base" style="transition-duration:' + baseDuration + 's"></div></div>' +
      '</div>' +
      '<div class="race-lane boost">' +
        '<div class="race-label">납입액 +' + (boostWon / 10000) + '만원 (' + manwonLabel(baseContribution + boostWon) + ') — ' + (boostedYears ? boostedYears + '년' : '100년 이내 미도달') + '</div>' +
        '<div class="race-track"><div class="race-marker" id="race-marker-boost" style="transition-duration:' + boostDuration + 's"></div></div>' +
      '</div>';

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        if (baseYears) document.getElementById('race-marker-base').classList.add('go');
        if (boostedYears) document.getElementById('race-marker-boost').classList.add('go');
      });
    });
  }

  document.getElementById('goal-calculate').addEventListener('click', () => {
    const inputs = readInputs();
    const goalWon = Number(document.getElementById('goalAmount').value) * 100000000;
    const boostWon = Number(document.getElementById('contributionBoost').value) * 10000;
    const showReal = document.getElementById('showReal').checked;

    const baseYears = findYearsToGoal(inputs, inputs.contributionAmount, goalWon, showReal);
    const boostedYears = findYearsToGoal(inputs, inputs.contributionAmount + boostWon, goalWon, showReal);

    const resultEl = document.getElementById('goal-result');
    if (baseYears) {
      resultEl.textContent = '목표 금액 도달까지 약 ' + baseYears + '년이 걸립니다.';
      if (boostedYears && boostedYears < baseYears) {
        resultEl.textContent += ' 납입액을 ' + (boostWon / 10000) + '만원 늘리면 ' + boostedYears + '년으로 ' + (baseYears - boostedYears) + '년 단축됩니다.';
      } else if (boostedYears && boostedYears === baseYears) {
        resultEl.textContent += ' 납입액을 늘려도 도달 기간은 동일합니다.';
      }
    } else {
      resultEl.textContent = '100년 이내에는 목표 금액에 도달하지 못합니다. 조건을 조정해 보세요.';
    }

    renderGoalRace(baseYears, boostedYears, boostWon, inputs.contributionAmount);
  });

  recalculate();
})();

</script>
</body>
</html>
